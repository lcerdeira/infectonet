<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Dark navy outer circle fill -->
  <circle cx="16" cy="16" r="15.5" fill="#1b2d4f"/>

  <!-- Teal geometric ring lines (octagonal web) -->
  <circle cx="16" cy="16" r="14" fill="none" stroke="#0d9488" stroke-width="1.2"/>
  <!-- Diagonal spokes -->
  <line x1="6.1" y1="6.1" x2="25.9" y2="25.9" stroke="#0d9488" stroke-width="0.7" opacity="0.6"/>
  <line x1="25.9" y1="6.1" x2="6.1" y2="25.9" stroke="#0d9488" stroke-width="0.7" opacity="0.6"/>
  <line x1="16" y1="2"  x2="16" y2="30" stroke="#0d9488" stroke-width="0.7" opacity="0.6"/>
  <line x1="2"  y1="16" x2="30" y2="16" stroke="#0d9488" stroke-width="0.7" opacity="0.6"/>

  <!-- Central sphere (virus body) -->
  <circle cx="16" cy="16" r="9" fill="#1e4080"/>

  <!-- Virus surface dots -->
  <circle cx="16" cy="8"  r="1.1" fill="#4a90d9"/>
  <circle cx="22" cy="11" r="1.1" fill="#4a90d9"/>
  <circle cx="23" cy="19" r="1.1" fill="#4a90d9"/>
  <circle cx="16" cy="24" r="1.1" fill="#4a90d9"/>
  <circle cx="9"  cy="20" r="1.1" fill="#4a90d9"/>
  <circle cx="9"  cy="12" r="1.1" fill="#4a90d9"/>

  <!-- DNA double helix (teal) -->
  <path d="M13 10 C12 12 14 14 13 16 C12 18 14 20 13 22" stroke="#0d9488" stroke-width="1.5" stroke-linecap="round" fill="none"/>
  <path d="M19 10 C20 12 18 14 19 16 C20 18 18 20 19 22" stroke="#0fba9e" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.85"/>
  <!-- Rungs -->
  <line x1="13" y1="12.5" x2="19" y2="12.5" stroke="#0d9488" stroke-width="0.9" opacity="0.9"/>
  <line x1="13" y1="16"   x2="19" y2="16"   stroke="#0d9488" stroke-width="0.9" opacity="0.9"/>
  <line x1="13" y1="19.5" x2="19" y2="19.5" stroke="#0d9488" stroke-width="0.9" opacity="0.9"/>
</svg>
