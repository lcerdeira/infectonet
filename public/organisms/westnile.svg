<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 120" fill="none">
  <!-- WNV - flavivirus with icosahedral E-protein shell -->
  <circle cx="80" cy="56" r="32" fill="#10B98118" stroke="#10B981" stroke-width="2"/>
  <!-- Icosahedral T=3 symmetry (like dengue) -->
  <polygon points="80,25 106,43 106,69 80,87 54,69 54,43" stroke="#10B981" stroke-width="1.3" fill="none"/>
  <!-- E protein dimers on surface -->
  <ellipse cx="93" cy="34" rx="6" ry="3" fill="#10B98130" stroke="#10B981" stroke-width="1" transform="rotate(-30 93 34)"/>
  <ellipse cx="106" cy="56" rx="6" ry="3" fill="#10B98130" stroke="#10B981" stroke-width="1"/>
  <ellipse cx="93" cy="78" rx="6" ry="3" fill="#10B98130" stroke="#10B981" stroke-width="1" transform="rotate(30 93 78)"/>
  <ellipse cx="67" cy="78" rx="6" ry="3" fill="#10B98130" stroke="#10B981" stroke-width="1" transform="rotate(-30 67 78)"/>
  <ellipse cx="54" cy="56" rx="6" ry="3" fill="#10B98130" stroke="#10B981" stroke-width="1"/>
  <ellipse cx="67" cy="34" rx="6" ry="3" fill="#10B98130" stroke="#10B981" stroke-width="1" transform="rotate(30 67 34)"/>
  <!-- Inner nucleocapsid -->
  <circle cx="80" cy="56" r="15" fill="#10B98120" stroke="#10B981" stroke-width="1"/>
  <!-- ssRNA genome -->
  <path d="M72 52 Q80 46 88 52 Q80 58 72 64 Q80 70 88 64" stroke="#10B981" stroke-width="1.3" fill="none" opacity="0.7"/>
  <!-- Mosquito vector hint -->
  <line x1="120" y1="20" x2="130" y2="10" stroke="#10B981" stroke-width="1" opacity="0.5"/>
  <line x1="130" y1="10" x2="140" y2="15" stroke="#10B981" stroke-width="1" opacity="0.5"/>
  <!-- Label -->
  <text x="80" y="110" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#10B981" text-anchor="middle">WNV</text>
</svg>
