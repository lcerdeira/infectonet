<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 120" fill="none">
  <!-- SIV - lentivirus, conical capsid (like HIV) -->
  <circle cx="80" cy="56" r="34" fill="#EC489918" stroke="#EC4899" stroke-width="2"/>
  <!-- Glycoprotein spikes (gp120/gp41 trimers) -->
  <line x1="80" y1="22" x2="80" y2="12" stroke="#EC4899" stroke-width="2"/>
  <path d="M76 12 Q80 8 84 12" stroke="#EC4899" stroke-width="1.5" fill="#EC489930"/>
  <line x1="105" y1="32" x2="112" y2="24" stroke="#EC4899" stroke-width="2"/>
  <path d="M109 24 Q112 20 116 24" stroke="#EC4899" stroke-width="1.5" fill="#EC489930" transform="rotate(-45 112 24)"/>
  <line x1="55" y1="32" x2="48" y2="24" stroke="#EC4899" stroke-width="2"/>
  <line x1="46" y1="56" x2="36" y2="56" stroke="#EC4899" stroke-width="2"/>
  <line x1="114" y1="56" x2="124" y2="56" stroke="#EC4899" stroke-width="2"/>
  <line x1="80" y1="90" x2="80" y2="100" stroke="#EC4899" stroke-width="2"/>
  <!-- Conical capsid core (distinctive lentivirus feature) -->
  <path d="M68 46 L92 46 L88 72 L72 72 Z" fill="#EC489928" stroke="#EC4899" stroke-width="1.5"/>
  <!-- Genomic RNA + RT -->
  <path d="M73 55 Q80 50 87 55" stroke="#EC4899" stroke-width="1.2" fill="none" opacity="0.7"/>
  <path d="M73 62 Q80 67 87 62" stroke="#EC4899" stroke-width="1.2" fill="none" opacity="0.7"/>
  <!-- Label -->
  <text x="80" y="116" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#EC4899" text-anchor="middle">SIV</text>
</svg>
