<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 120" fill="none">
  <!-- Triple-layered particle (wheel-like) - outer layer -->
  <circle cx="80" cy="56" r="36" fill="#8B5CF618" stroke="#8B5CF6" stroke-width="2"/>
  <!-- VP4 spike projections (characteristic spokes) -->
  <line x1="80" y1="20" x2="80" y2="11" stroke="#8B5CF6" stroke-width="2"/>
  <circle cx="80" cy="9" r="3" fill="#8B5CF6"/>
  <line x1="102" y1="28" x2="108" y2="21" stroke="#8B5CF6" stroke-width="2"/>
  <circle cx="110" cy="19" r="3" fill="#8B5CF6"/>
  <line x1="116" y1="55" x2="124" y2="55" stroke="#8B5CF6" stroke-width="2"/>
  <circle cx="127" cy="55" r="3" fill="#8B5CF6"/>
  <line x1="58" y1="28" x2="52" y2="21" stroke="#8B5CF6" stroke-width="2"/>
  <circle cx="50" cy="19" r="3" fill="#8B5CF6"/>
  <line x1="44" y1="55" x2="36" y2="55" stroke="#8B5CF6" stroke-width="2"/>
  <circle cx="33" cy="55" r="3" fill="#8B5CF6"/>
  <line x1="80" y1="92" x2="80" y2="101" stroke="#8B5CF6" stroke-width="2"/>
  <circle cx="80" cy="103" r="3" fill="#8B5CF6"/>
  <!-- Middle layer -->
  <circle cx="80" cy="56" r="24" stroke="#8B5CF6" stroke-width="1.5" fill="#8B5CF612"/>
  <!-- Inner layer (core) -->
  <circle cx="80" cy="56" r="14" stroke="#8B5CF6" stroke-width="1.5" fill="#8B5CF620"/>
  <!-- dsRNA segments (11 segments) -->
  <circle cx="80" cy="56" r="6" fill="#8B5CF640"/>
  <!-- Label -->
  <text x="80" y="116" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#8B5CF6" text-anchor="middle">Rotavirus</text>
