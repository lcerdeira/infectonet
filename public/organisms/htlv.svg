<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 120" fill="none">
  <!-- HTLV - C-type retrovirus, spherical with central nucleoid -->
  <circle cx="80" cy="56" r="34" fill="#EC489918" stroke="#EC4899" stroke-width="2"/>
  <!-- Surface glycoproteins (gp46/gp21) -->
  <line x1="80" y1="22" x2="80" y2="12" stroke="#EC4899" stroke-width="2"/>
  <circle cx="80" cy="10" r="3.5" fill="#EC4899"/>
  <line x1="104" y1="31" x2="111" y2="23" stroke="#EC4899" stroke-width="2"/>
  <circle cx="114" cy="21" r="3.5" fill="#EC4899"/>
  <line x1="56" y1="31" x2="49" y2="23" stroke="#EC4899" stroke-width="2"/>
  <circle cx="46" cy="21" r="3.5" fill="#EC4899"/>
  <line x1="114" y1="57" x2="124" y2="57" stroke="#EC4899" stroke-width="2"/>
  <circle cx="127" cy="57" r="3.5" fill="#EC4899"/>
  <line x1="46" y1="57" x2="36" y2="57" stroke="#EC4899" stroke-width="2"/>
  <circle cx="33" cy="57" r="3.5" fill="#EC4899"/>
  <line x1="80" y1="90" x2="80" y2="100" stroke="#EC4899" stroke-width="2"/>
  <circle cx="80" cy="103" r="3.5" fill="#EC4899"/>
  <!-- Eccentric electron-dense nucleoid (C-type) -->
  <circle cx="80" cy="56" r="16" fill="#EC489920" stroke="#EC4899" stroke-width="1.5"/>
  <!-- Mature C-type core (central) -->
  <circle cx="80" cy="56" r="8" fill="#EC489940" stroke="#EC4899" stroke-width="1"/>
  <!-- Label -->
  <text x="80" y="116" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#EC4899" text-anchor="middle">HTLV</text>
</svg>
