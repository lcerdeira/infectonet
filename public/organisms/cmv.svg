<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 120" fill="none">
  <!-- CMV (betaherpesvirus) - larger than HSV, distinctive dense body -->
  <!-- Envelope -->
  <circle cx="80" cy="55" r="38" fill="#6B728015" stroke="#6B7280" stroke-width="1.5" stroke-dasharray="4 2"/>
  <!-- Dense body (unique to CMV) -->
  <circle cx="67" cy="50" r="9" fill="#6B728030" stroke="#6B7280" stroke-width="1.2"/>
  <circle cx="95" cy="62" r="6" fill="#6B728025" stroke="#6B7280" stroke-width="1.2"/>
  <!-- Tegument -->
  <circle cx="80" cy="55" r="25" fill="#6B728012" stroke="#6B7280" stroke-width="1.5" opacity="0.6"/>
  <!-- Capsid -->
  <circle cx="80" cy="55" r="16" fill="#6B728020" stroke="#6B7280" stroke-width="2"/>
  <polygon points="80,39 93,47 93,63 80,71 67,63 67,47" stroke="#6B7280" stroke-width="1" fill="none"/>
  <!-- Glycoprotein complex gH/gL/gO -->
  <circle cx="80" cy="17" r="3" fill="#6B7280"/>
  <circle cx="110" cy="30" r="3" fill="#6B7280"/>
  <circle cx="118" cy="55" r="3" fill="#6B7280"/>
  <circle cx="50" cy="30" r="3" fill="#6B7280"/>
  <circle cx="42" cy="55" r="3" fill="#6B7280"/>
  <!-- Label -->
  <text x="80" y="111" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#6B7280" text-anchor="middle">CMV</text>
</svg>
