  <!-- E1/E2 heterodimer spikes -->
  <line x1="80" y1="24" x2="80" y2="14" stroke="#F97316" stroke-width="2"/>
  <ellipse cx="80" cy="12" rx="4" ry="3" fill="#F97316"/>
  <line x1="105" y1="33" x2="112" y2="26" stroke="#F97316" stroke-width="2"/>
  <ellipse cx="115" cy="23" rx="4" ry="3" fill="#F97316" transform="rotate(-45 115 23)"/>
  <line x1="112" y1="58" x2="122" y2="58" stroke="#F97316" stroke-width="2"/>
  <ellipse cx="124" cy="58" rx="4" ry="3" fill="#F97316"/>
  <line x1="55" y1="33" x2="48" y2="26" stroke="#F97316" stroke-width="2"/>
  <ellipse cx="45" cy="23" rx="4" ry="3" fill="#F97316" transform="rotate(45 45 23)"/>
  <line x1="48" y1="58" x2="38" y2="58" stroke="#F97316" stroke-width="2"/>
