  <!-- ssRNA -->
  <path d="M72 50 Q80 44 88 50 Q80 56 72 62 Q80 68 88 62" stroke="#F97316" stroke-width="1.2" fill="none" opacity="0.6"/>
  <!-- Label -->
  <text x="80" y="116" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#F97316" text-anchor="middle">HCV</text>
</svg>
