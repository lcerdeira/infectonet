<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 120" fill="none">
  <!-- Very small icosahedral naked capsid (one of smallest DNA viruses) -->
  <circle cx="80" cy="57" r="25" fill="#8B5CF618" stroke="#8B5CF6" stroke-width="2"/>
  <!-- T=1 icosahedral symmetry - simple triangle pattern -->
  <polygon points="80,32 98,48 98,66 80,82 62,66 62,48" stroke="#8B5CF6" stroke-width="1.3" fill="none"/>
  <polygon points="80,32 80,57 98,48" stroke="#8B5CF6" stroke-width="1" fill="#8B5CF620"/>
  <polygon points="98,48 80,57 98,66" stroke="#8B5CF6" stroke-width="1" fill="#8B5CF215"/>
  <polygon points="80,82 80,57 98,66" stroke="#8B5CF6" stroke-width="1" fill="#8B5CF220"/>
  <polygon points="62,66 80,57 80,82" stroke="#8B5CF6" stroke-width="1" fill="#8B5CF215"/>
  <polygon points="62,48 80,57 62,66" stroke="#8B5CF6" stroke-width="1" fill="#8B5CF220"/>
  <polygon points="80,32 62,48 80,57" stroke="#8B5CF6" stroke-width="1" fill="#8B5CF215"/>
  <!-- Spikes at threefold axes -->
  <circle cx="80" cy="32" r="3" fill="#8B5CF6"/>
  <circle cx="98" cy="48" r="3" fill="#8B5CF6"/>
  <circle cx="62" cy="48" r="3" fill="#8B5CF6"/>
  <!-- ssDNA -->
  <text x="80" y="60" font-family="system-ui,sans-serif" font-size="7" fill="#8B5CF6" text-anchor="middle" opacity="0.6">ssDNA</text>
  <!-- Label -->
  <text x="80" y="110" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#8B5CF6" text-anchor="middle">Parvo B19</text>
</svg>
