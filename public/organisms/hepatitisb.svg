<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 120" fill="none">
  <!-- HBV - Dane particle (complete virion) with surface antigen (HBsAg) -->
  <!-- Outer envelope with surface antigen -->
  <circle cx="80" cy="56" r="32" fill="#F9741618" stroke="#F97316" stroke-width="2"/>
  <!-- HBsAg subunit spikes on surface -->
  <circle cx="80" cy="24" r="3.5" fill="#F97316"/>
  <circle cx="103" cy="35" r="3.5" fill="#F97316"/>
  <circle cx="112" cy="58" r="3.5" fill="#F97316"/>
  <circle cx="103" cy="79" r="3.5" fill="#F97316"/>
  <circle cx="80" cy="88" r="3.5" fill="#F97316"/>
  <circle cx="57" cy="79" r="3.5" fill="#F97316"/>
  <circle cx="48" cy="58" r="3.5" fill="#F97316"/>
  <circle cx="57" cy="35" r="3.5" fill="#F97316"/>
  <!-- Inner icosahedral nucleocapsid -->
  <circle cx="80" cy="56" r="18" fill="#F9741620" stroke="#F97316" stroke-width="1.5"/>
  <!-- Partial dsDNA genome (open circle) -->
  <circle cx="80" cy="56" r="9" stroke="#F97316" stroke-width="1.5" fill="none" stroke-dasharray="12 4"/>
  <!-- Polymerase label -->
  <circle cx="80" cy="56" r="3" fill="#F9741660"/>
  <!-- Label -->
  <text x="80" y="110" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#F97316" text-anchor="middle">HBV</text>
</svg>
