<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 120" fill="none">
  <!-- Disease X - unknown/abstract pathogen representation -->
  <!-- Outer hazard-like ring -->
  <circle cx="80" cy="56" r="38" stroke="#6B7280" stroke-width="1.5" stroke-dasharray="6 4" opacity="0.5"/>
  <!-- Biohazard-inspired abstract shape -->
  <circle cx="80" cy="56" r="14" fill="#6B728020" stroke="#6B7280" stroke-width="2"/>
  <!-- Three lobes (biohazard pattern) -->
  <circle cx="80" cy="33" r="10" fill="#6B728018" stroke="#6B7280" stroke-width="1.5" opacity="0.8"/>
  <circle cx="100" cy="67" r="10" fill="#6B728018" stroke="#6B7280" stroke-width="1.5" opacity="0.8"/>
  <circle cx="60" cy="67" r="10" fill="#6B728018" stroke="#6B7280" stroke-width="1.5" opacity="0.8"/>
  <!-- Question mark -->
  <text x="80" y="62" font-family="system-ui,sans-serif" font-size="20" font-weight="700" fill="#6B7280" text-anchor="middle" opacity="0.9">?</text>
  <!-- Orbiting particles (unknown agent) -->
  <circle cx="118" cy="35" r="4" fill="none" stroke="#6B7280" stroke-width="1.5" stroke-dasharray="2 2"/>
  <circle cx="118" cy="35" r="1.5" fill="#6B7280" opacity="0.6"/>
  <circle cx="42" cy="35" r="4" fill="none" stroke="#6B7280" stroke-width="1.5" stroke-dasharray="2 2"/>
  <circle cx="42" cy="35" r="1.5" fill="#6B7280" opacity="0.6"/>
  <!-- Label -->
  <text x="80" y="112" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#6B7280" text-anchor="middle">Disease X</text>
</svg>
