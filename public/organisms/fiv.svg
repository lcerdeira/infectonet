<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 120" fill="none">
  <!-- FIV - lentivirus similar to HIV/SIV -->
  <circle cx="80" cy="56" r="33" fill="#EC489918" stroke="#EC4899" stroke-width="2"/>
  <!-- FIV-specific: fewer surface spikes than HIV -->
  <line x1="80" y1="23" x2="80" y2="13" stroke="#EC4899" stroke-width="2"/>
  <circle cx="80" cy="11" r="3" fill="#EC4899"/>
  <line x1="108" y1="36" x2="115" y2="29" stroke="#EC4899" stroke-width="2"/>
  <circle cx="117" cy="27" r="3" fill="#EC4899"/>
  <line x1="113" y1="60" x2="123" y2="60" stroke="#EC4899" stroke-width="2"/>
  <circle cx="126" cy="60" r="3" fill="#EC4899"/>
  <line x1="52" y1="36" x2="45" y2="29" stroke="#EC4899" stroke-width="2"/>
  <circle cx="43" cy="27" r="3" fill="#EC4899"/>
  <line x1="47" y1="60" x2="37" y2="60" stroke="#EC4899" stroke-width="2"/>
  <circle cx="34" cy="60" r="3" fill="#EC4899"/>
  <!-- Conical capsid (lentivirus) -->
  <path d="M70 44 L90 44 L87 70 L73 70 Z" fill="#EC489928" stroke="#EC4899" stroke-width="1.5"/>
  <!-- Cat paw print hint (feline context) -->
  <circle cx="80" cy="57" r="6" fill="#EC489935" stroke="#EC4899" stroke-width="1" opacity="0.6"/>
  <!-- Label -->
  <text x="80" y="108" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#EC4899" text-anchor="middle">FIV</text>
</svg>
