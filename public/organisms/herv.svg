<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 120" fill="none">
  <!-- HERV - Endogenous retrovirus embedded in host chromosome -->
  <!-- Chromosome / DNA strand context -->
  <path d="M30 30 Q80 18 130 30 Q130 56 130 82 Q80 94 30 82 Q30 56 30 30" stroke="#EC4899" stroke-width="1.5" fill="#EC489910" stroke-dasharray="4 2"/>
  <!-- LTR flanking sequences -->
  <rect x="30" y="44" width="18" height="24" rx="4" fill="#EC489930" stroke="#EC4899" stroke-width="1.5"/>
  <text x="39" y="60" font-family="system-ui,sans-serif" font-size="7" font-weight="700" fill="#EC4899" text-anchor="middle">LTR</text>
  <rect x="112" y="44" width="18" height="24" rx="4" fill="#EC489930" stroke="#EC4899" stroke-width="1.5"/>
  <text x="121" y="60" font-family="system-ui,sans-serif" font-size="7" font-weight="700" fill="#EC4899" text-anchor="middle">LTR</text>
  <!-- Internal retroviral genes -->
  <rect x="55" y="47" width="16" height="18" rx="2" fill="#EC489925" stroke="#EC4899" stroke-width="1.2"/>
  <text x="63" y="60" font-family="system-ui,sans-serif" font-size="6" fill="#EC4899" text-anchor="middle">gag</text>
  <rect x="75" y="47" width="14" height="18" rx="2" fill="#EC489925" stroke="#EC4899" stroke-width="1.2"/>
  <text x="82" y="60" font-family="system-ui,sans-serif" font-size="6" fill="#EC4899" text-anchor="middle">pol</text>
  <rect x="93" y="47" width="14" height="18" rx="2" fill="#EC489925" stroke="#EC4899" stroke-width="1.2"/>
  <text x="100" y="60" font-family="system-ui,sans-serif" font-size="6" fill="#EC4899" text-anchor="middle">env</text>
  <!-- Silenced / methylated markers -->
  <circle cx="63" cy="35" r="3" fill="#EC4899" opacity="0.5"/>
  <circle cx="80" cy="32" r="3" fill="#EC4899" opacity="0.5"/>
  <circle cx="97" cy="35" r="3" fill="#EC4899" opacity="0.5"/>
  <!-- Label -->
  <text x="80" y="112" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#EC4899" text-anchor="middle">HERV</text>
</svg>
