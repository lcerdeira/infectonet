<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 120" fill="none">
  <!-- Small icosahedral naked capsid (picornavirus) -->
  <circle cx="80" cy="55" r="32" fill="#3B82F618" stroke="#3B82F6" stroke-width="2"/>
  <!-- Icosahedral faces -->
  <polygon points="80,25 100,40 100,70 80,85 60,70 60,40" stroke="#3B82F6" stroke-width="1" fill="none" opacity="0.6"/>
  <line x1="80" y1="25" x2="80" y2="55" stroke="#3B82F6" stroke-width="1" opacity="0.5"/>
  <line x1="100" y1="40" x2="80" y2="55" stroke="#3B82F6" stroke-width="1" opacity="0.5"/>
  <line x1="100" y1="70" x2="80" y2="55" stroke="#3B82F6" stroke-width="1" opacity="0.5"/>
  <line x1="80" y1="85" x2="80" y2="55" stroke="#3B82F6" stroke-width="1" opacity="0.5"/>
  <line x1="60" y1="70" x2="80" y2="55" stroke="#3B82F6" stroke-width="1" opacity="0.5"/>
  <line x1="60" y1="40" x2="80" y2="55" stroke="#3B82F6" stroke-width="1" opacity="0.5"/>
  <!-- Canyon (receptor binding site) -->
  <circle cx="80" cy="55" r="10" stroke="#3B82F6" stroke-width="1.5" stroke-dasharray="3 2" fill="none"/>
  <!-- Vertices -->
  <circle cx="80" cy="25" r="3" fill="#3B82F6"/>
  <circle cx="100" cy="40" r="3" fill="#3B82F6"/>
  <circle cx="100" cy="70" r="3" fill="#3B82F6"/>
  <circle cx="80" cy="85" r="3" fill="#3B82F6"/>
  <circle cx="60" cy="70" r="3" fill="#3B82F6"/>
  <circle cx="60" cy="40" r="3" fill="#3B82F6"/>
  <!-- Label -->
  <text x="80" y="110" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#3B82F6" text-anchor="middle">Rhinovirus</text>
</svg>
