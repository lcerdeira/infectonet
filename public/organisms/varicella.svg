<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 120" fill="none">
  <!-- Herpesvirus: envelope + tegument + capsid (3 layers) -->
  <circle cx="80" cy="56" r="38" fill="#8B5CF618" stroke="#8B5CF6" stroke-width="1.5" stroke-dasharray="4 2"/>
  <!-- Tegument layer -->
  <circle cx="80" cy="56" r="28" fill="#8B5CF615" stroke="#8B5CF6" stroke-width="1.5" opacity="0.7"/>
  <!-- Icosahedral capsid -->
  <circle cx="80" cy="56" r="18" fill="#8B5CF620" stroke="#8B5CF6" stroke-width="2"/>
  <polygon points="80,38 94,47 94,65 80,74 66,65 66,47" stroke="#8B5CF6" stroke-width="1.2" fill="none" opacity="0.8"/>
  <!-- Glycoprotein spikes on envelope -->
  <circle cx="80" cy="18" r="3" fill="#8B5CF6"/>
  <circle cx="108" cy="30" r="3" fill="#8B5CF6"/>
  <circle cx="118" cy="58" r="3" fill="#8B5CF6"/>
  <circle cx="108" cy="82" r="3" fill="#8B5CF6"/>
  <circle cx="52" cy="30" r="3" fill="#8B5CF6"/>
  <circle cx="42" cy="58" r="3" fill="#8B5CF6"/>
  <circle cx="52" cy="82" r="3" fill="#8B5CF6"/>
  <!-- Label -->
  <text x="80" y="112" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#8B5CF6" text-anchor="middle">VZV</text>
</svg>
