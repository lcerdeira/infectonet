<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 52" fill="none">
  <!-- Circular emblem -->
  <circle cx="26" cy="26" r="23" stroke="#0d9488" stroke-width="1.5" opacity="0.4"/>
  <circle cx="26" cy="26" r="16" stroke="#0d9488" stroke-width="1.5" opacity="0.6"/>

  <!-- DNA helix left strand -->
  <path d="M20 10 C18 15 22 20 20 25 C18 30 22 35 20 42" stroke="#0d9488" stroke-width="2" stroke-linecap="round" fill="none"/>
  <!-- DNA helix right strand -->
  <path d="M32 10 C34 15 30 20 32 25 C34 30 30 35 32 42" stroke="#0891b2" stroke-width="2" stroke-linecap="round" fill="none"/>
  <!-- Rungs -->
  <line x1="20" y1="14" x2="32" y2="14" stroke="#0d9488" stroke-width="1.2" opacity="0.7"/>
  <line x1="20" y1="20" x2="32" y2="20" stroke="#0d9488" stroke-width="1.2" opacity="0.7"/>
  <line x1="20" y1="26" x2="32" y2="26" stroke="#0d9488" stroke-width="1.2" opacity="0.7"/>
  <line x1="20" y1="32" x2="32" y2="32" stroke="#0d9488" stroke-width="1.2" opacity="0.7"/>
  <line x1="20" y1="38" x2="32" y2="38" stroke="#0d9488" stroke-width="1.2" opacity="0.7"/>

  <!-- Outer nodes (network) -->
  <circle cx="26" cy="3"  r="3" fill="#0d9488"/>
  <circle cx="26" cy="49" r="3" fill="#0d9488"/>
  <circle cx="3"  cy="26" r="3" fill="#0891b2"/>
  <circle cx="49" cy="26" r="3" fill="#0891b2"/>
  <!-- Diagonal nodes -->
  <circle cx="9"  cy="9"  r="2" fill="#0d9488" opacity="0.7"/>
  <circle cx="43" cy="9"  r="2" fill="#0d9488" opacity="0.7"/>
  <circle cx="9"  cy="43" r="2" fill="#0891b2" opacity="0.7"/>
  <circle cx="43" cy="43" r="2" fill="#0891b2" opacity="0.7"/>

  <!-- Wordmark -->
  <text x="60" y="20" font-family="system-ui,-apple-system,sans-serif" font-size="18" font-weight="300" letter-spacing="-0.3" fill="#1e293b">Infecto</text>
  <text x="120" y="20" font-family="system-ui,-apple-system,sans-serif" font-size="18" font-weight="800" letter-spacing="-0.5" fill="#0d9488">NET</text>
  <text x="60" y="35" font-family="system-ui,-apple-system,sans-serif" font-size="7.5" font-weight="400" letter-spacing="2.5" fill="#64748b">SURVEILLANCE NETWORK</text>
</svg>
